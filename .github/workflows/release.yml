name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # v1.0.8 style: no manual obs-deps zip — OBS CMake fetches into third_party/obs-studio/.deps/
      - name: Build OBS Studio (minimal flags, matches v1.0.8)
        shell: pwsh
        run: |
          $ws = "${{ github.workspace }}"
          cmake -S third_party/obs-studio -B build-obs `
            -DENABLE_PLUGINS=OFF `
            -DENABLE_SCRIPTING=OFF `
            -DCMAKE_INSTALL_PREFIX="$ws/obs-install"
          cmake --build build-obs --config Release

      # libobsConfig.cmake is installed with COMPONENT Development + EXCLUDE_FROM_ALL
      - name: Install libobs into prefix (Runtime + Development)
        shell: pwsh
        run: |
          $prefix = "${{ github.workspace }}/obs-install"
          cmake --install build-obs --config Release --prefix $prefix
          cmake --install build-obs --config Release --prefix $prefix --component Development
          $cfg = Get-ChildItem -Path $prefix -Recurse -Filter libobsConfig.cmake -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $cfg) {
            Write-Error "libobsConfig.cmake not found under $prefix after install."
            Get-ChildItem -Path $prefix -Recurse -ErrorAction SilentlyContinue | Select-Object -First 50 FullName
            exit 1
          }
          Write-Host "Found $($cfg.FullName)"

      - name: Configure Plugin CMake
        shell: pwsh
        run: |
          $ws = "${{ github.workspace }}"
          $prefix = "$ws/obs-install"
          $libobsCfg = Get-ChildItem -Path $prefix -Recurse -Filter libobsConfig.cmake | Select-Object -First 1
          $feCfg = Get-ChildItem -Path $prefix -Recurse -Filter "obs-frontend-apiConfig.cmake" | Select-Object -First 1
          if (-not $libobsCfg -or -not $feCfg) {
            Write-Error "Missing CMake package files under $prefix (libobs or obs-frontend-api)."
            exit 1
          }
          $depsPath = (Get-ChildItem -Path "third_party/obs-studio/.deps/obs-deps-20*" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          $qt6Path = (Get-ChildItem -Path "third_party/obs-studio/.deps/obs-deps-qt6-*" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $depsPath) {
            Write-Error "No third_party/obs-studio/.deps/obs-deps-20* — OBS configure did not fetch dependencies. List .deps:"
            Get-ChildItem "third_party/obs-studio/.deps" -ErrorAction SilentlyContinue
            exit 1
          }
          $simdeInclude = $null
          $cacheFile = Join-Path $ws "build-obs/CMakeCache.txt"
          if (Test-Path $cacheFile) {
            $cacheLine = Get-Content $cacheFile | Where-Object { $_ -match '^SIMDe_INCLUDE_DIR:' } | Select-Object -First 1
            if ($cacheLine -and $cacheLine.Contains('=')) {
              $simdeInclude = $cacheLine.Substring($cacheLine.IndexOf('=') + 1).Trim()
            }
          }
          $simdeCheck = if ($simdeInclude) { Join-Path $simdeInclude (Join-Path "simde" "simde-common.h") } else { $null }
          if (-not $simdeCheck -or -not (Test-Path -LiteralPath $simdeCheck)) {
            $roots = @($depsPath, "$ws/third_party/obs-studio/.deps", "$ws/build-obs")
            if ($qt6Path) { $roots += $qt6Path }
            $simdeHeader = $roots | ForEach-Object {
              Get-ChildItem -Path $_ -Recurse -Filter simde-common.h -ErrorAction SilentlyContinue
            } | Where-Object { $_.FullName -match '[\\/]simde[\\/]simde-common\.h$' } |
              Select-Object -First 1
            if ($simdeHeader) {
              $simdeInclude = $simdeHeader.Directory.Parent.FullName
            }
          }
          if (-not $simdeInclude -or -not (Test-Path -LiteralPath (Join-Path $simdeInclude (Join-Path "simde" "simde-common.h")))) {
            Write-Error "SIMDe headers not found (cache, .deps, build-obs)."
            exit 1
          }
          # Same order as tag v1.0.8: install prefix, cmake exports, Qt from .deps, main deps from .deps
          $parts = @($prefix, (Join-Path $prefix "cmake"))
          if ($qt6Path) { $parts += $qt6Path }
          $parts += $depsPath
          $env:CMAKE_PREFIX_PATH = $parts -join ';'
          $releaseTag = "${{ github.ref_name }}"
          cmake -B build -S . `
            "-DPLUGIN_VERSION_FROM_TAG=$releaseTag" `
            "-Dlibobs_DIR=$($libobsCfg.DirectoryName)" `
            "-Dobs-frontend-api_DIR=$($feCfg.DirectoryName)" `
            "-DSIMDe_INCLUDE_DIR=$simdeInclude"

      - name: Build Plugin
        run: cmake --build build --config Release

      # unit-tests links libobs / obs-frontend-api — Windows needs those DLLs on PATH (0xc0000135 otherwise).
      - name: Run tests
        shell: pwsh
        run: |
          $ws = "${{ github.workspace }}"
          $prefix = Join-Path $ws "obs-install"
          $depsPath = (Get-ChildItem -Path "third_party/obs-studio/.deps/obs-deps-20*" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          $qt6Path = (Get-ChildItem -Path "third_party/obs-studio/.deps/obs-deps-qt6-*" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          $binDirs = @(
            (Join-Path $prefix "bin\64bit"),
            (Join-Path $prefix "bin")
          )
          if ($depsPath) { $binDirs += (Join-Path $depsPath "bin") }
          if ($qt6Path) { $binDirs += (Join-Path $qt6Path "bin") }
          $existing = $binDirs | Where-Object { Test-Path $_ }
          if ($existing.Count -gt 0) {
            $env:PATH = ($existing -join ';') + ';' + $env:PATH
            Write-Host "Prepended to PATH:" ($existing -join '; ')
          }
          ctest --test-dir build -C Release --output-on-failure

      - name: Install plugin layout to dist/
        run: cmake --install build --config Release --prefix "${{ github.workspace }}/dist"

      - name: Zip Release
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\obs-plugins\obs-multistream-plugin.dll")) {
            Write-Error "Expected dist\obs-plugins\obs-multistream-plugin.dll after install — check CMake install() rules."
            exit 1
          }
          if (Test-Path obs-multistream-plugin-windows.zip) { Remove-Item obs-multistream-plugin-windows.zip }
          Compress-Archive -Path "dist\*" -DestinationPath obs-multistream-plugin-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: obs-multistream-plugin-windows.zip
          generate_release_notes: true

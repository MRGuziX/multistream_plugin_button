name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build OBS Studio
        shell: pwsh
        run: |
          cmake -S third_party/obs-studio -B build-obs `
            -DENABLE_PLUGINS=OFF `
            -DENABLE_SCRIPTING=OFF `
            -DENABLE_BROWSER=OFF `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/obs-install"
          cmake --build build-obs --config Release
          cmake --install build-obs --config Release
          cmake --install build-obs --config Release --component Development

      - name: Configure Plugin
        shell: pwsh
        run: |
          $qt6Path = (Get-ChildItem -Path "third_party/obs-studio/.deps/obs-deps-qt6-*" -Directory | Select-Object -First 1).FullName
          $depsPath = (Get-ChildItem -Path "third_party/obs-studio/.deps/obs-deps-20*" -Directory | Select-Object -First 1).FullName
          cmake -B build -S . `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/obs-install;${{ github.workspace }}/obs-install/cmake;$qt6Path;$depsPath"

      - name: Build Plugin
        run: cmake --build build --config Release

      - name: Install Plugin
        run: cmake --install build --config Release --prefix dist

      - name: Zip Release
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath obs-multistream-plugin-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: obs-multistream-plugin-windows.zip
          generate_release_notes: true
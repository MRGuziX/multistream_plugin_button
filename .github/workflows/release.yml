name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download OBS Dependencies
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/obsproject/obs-deps/releases/download/2025-08-23/windows-deps-2025-08-23-x64.zip" -OutFile "obs-deps.zip"
          Expand-Archive -Path "obs-deps.zip" -DestinationPath "obs-deps"
          $ws = "${{ github.workspace }}"
          $explicit = Join-Path $ws "obs-deps/windows-deps-2025-08-23-x64"
          if (Test-Path $explicit) {
            $depsRoot = (Resolve-Path $explicit).Path
          } else {
            $fallback = Get-ChildItem (Join-Path $ws "obs-deps") -Directory -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -like "windows-deps-*" } |
              Select-Object -First 1
            if (-not $fallback) {
              Write-Error "Could not find windows-deps-* under obs-deps after unzip. Listing obs-deps:"
              Get-ChildItem (Join-Path $ws "obs-deps") -ErrorAction SilentlyContinue
              exit 1
            }
            $depsRoot = $fallback.FullName
          }
          "DEPS_INSTALL_PATH=$depsRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Using DEPS_INSTALL_PATH=$depsRoot"

      - name: Build libobs Core
        run: |
          cmake -S third_party/obs-studio -B build-obs -DDEPS_INSTALL_DIR="${{ env.DEPS_INSTALL_PATH }}" -DENABLE_UI=OFF -DENABLE_PLUGINS=OFF -DENABLE_SCRIPTING=OFF -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/obs-install"
          cmake --build build-obs --config Release

      # OBS installs CMake packages (libobsConfig.cmake, etc.) with COMPONENT Development + EXCLUDE_FROM_ALL.
      # `cmake --build --target install` often skips those rules. Install the Development component explicitly.
      - name: Install libobs into prefix (Development)
        shell: pwsh
        run: |
          $prefix = "${{ github.workspace }}/obs-install"
          cmake --install build-obs --config Release --prefix $prefix --component Development
          $cfg = Get-ChildItem -Path $prefix -Recurse -Filter libobsConfig.cmake -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $cfg) {
            Write-Error "libobsConfig.cmake not found under $prefix after Development install."
            Get-ChildItem -Path $prefix -Recurse -ErrorAction SilentlyContinue | Select-Object -First 50 FullName
            exit 1
          }
          Write-Host "Found $($cfg.FullName)"

      - name: Configure Plugin CMake
        shell: pwsh
        run: |
          $ws = "${{ github.workspace }}"
          $prefix = "$ws/obs-install"
          $deps = "${{ env.DEPS_INSTALL_PATH }}"
          $libobsCfg = Get-ChildItem -Path $prefix -Recurse -Filter libobsConfig.cmake | Select-Object -First 1
          $feCfg = Get-ChildItem -Path $prefix -Recurse -Filter "obs-frontend-apiConfig.cmake" | Select-Object -First 1
          if (-not $libobsCfg -or -not $feCfg) {
            Write-Error "Missing CMake package files under $prefix (libobs or obs-frontend-api)."
            exit 1
          }
          # Prefer SIMDe path from libobs configure (same as DEPS_INSTALL_DIR layout).
          $simdeInclude = $null
          $cacheFile = Join-Path $ws "build-obs/CMakeCache.txt"
          if (Test-Path $cacheFile) {
            $cacheLine = Get-Content $cacheFile | Where-Object { $_ -match '^SIMDe_INCLUDE_DIR:' } | Select-Object -First 1
            if ($cacheLine -and $cacheLine.Contains('=')) {
              $simdeInclude = $cacheLine.Substring($cacheLine.IndexOf('=') + 1).Trim()
            }
          }
          $simdeCheck = if ($simdeInclude) { Join-Path $simdeInclude (Join-Path "simde" "simde-common.h") } else { $null }
          if (-not $simdeCheck -or -not (Test-Path -LiteralPath $simdeCheck)) {
            $simdeHeader = Get-ChildItem -Path @($deps, "$ws/obs-deps", "$ws/build-obs") -Recurse -Filter simde-common.h -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match '[\\/]simde[\\/]simde-common\.h$' } |
              Select-Object -First 1
            if ($simdeHeader) {
              $simdeInclude = $simdeHeader.Directory.Parent.FullName
            }
          }
          if (-not $simdeInclude -or -not (Test-Path -LiteralPath (Join-Path $simdeInclude (Join-Path "simde" "simde-common.h")))) {
            Write-Error "SIMDe headers not found. Checked CMake cache, DEPS_INSTALL_PATH=$deps, obs-deps, build-obs."
            exit 1
          }
          # Put obs-deps first so FindSIMDe / Qt deps resolve (semicolons in -D values are easy to mishandle in pwsh).
          $env:CMAKE_PREFIX_PATH = "$deps;$prefix"
          cmake -B build -S . `
            "-Dlibobs_DIR=$($libobsCfg.DirectoryName)" `
            "-Dobs-frontend-api_DIR=$($feCfg.DirectoryName)" `
            "-DSIMDe_INCLUDE_DIR=$simdeInclude"

      - name: Build Plugin
        run: cmake --build build --config Release

      - name: Run tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Install plugin layout to dist/
        run: cmake --install build --config Release --prefix "${{ github.workspace }}/dist"

      - name: Zip Release
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\obs-plugins\obs-multistream-plugin.dll")) {
            Write-Error "Expected dist\obs-plugins\obs-multistream-plugin.dll after install — check CMake install() rules."
            exit 1
          }
          if (Test-Path obs-multistream-plugin-windows.zip) { Remove-Item obs-multistream-plugin-windows.zip }
          Compress-Archive -Path "dist\*" -DestinationPath obs-multistream-plugin-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: obs-multistream-plugin-windows.zip
          generate_release_notes: true
